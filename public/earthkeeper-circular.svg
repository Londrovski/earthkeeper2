<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="earthGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#E8D5A0"/>
      <stop offset="40%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A87C28"/>
    </radialGradient>
    <radialGradient id="centerGradient" cx="0.5" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#F5EDD8"/>
      <stop offset="100%" stop-color="#E8D5A0"/>
    </radialGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="190" fill="url(#earthGradient)" stroke="#0D2416" stroke-width="4"/>
  
  <!-- Symbolic earth patterns -->
  <path d="M80 200 Q200 120 320 200 Q200 280 80 200" fill="none" stroke="#0D2416" stroke-width="3" opacity="0.4"/>
  <path d="M200 80 Q280 200 200 320 Q120 200 200 80" fill="none" stroke="#0D2416" stroke-width="3" opacity="0.4"/>
  
  <!-- Center circle representing unity/clearing -->
  <circle cx="200" cy="200" r="50" fill="url(#centerGradient)" stroke="#0D2416" stroke-width="2"/>
  
  <!-- Inner geometric pattern -->
  <g stroke="#0D2416" stroke-width="1.5" fill="none" opacity="0.6">
    <circle cx="200" cy="200" r="30"/>
    <path d="M200 170 L200 230 M170 200 L230 200"/>
    <path d="M179 179 L221 221 M221 179 L179 221"/>
  </g>
  
  <!-- Small decorative dots around the edge -->
  <g fill="#0D2416" opacity="0.3">
    <circle cx="200" cy="40" r="4"/>
    <circle cx="360" cy="200" r="4"/>
    <circle cx="200" cy="360" r="4"/>
    <circle cx="40" cy="200" r="4"/>
    <circle cx="283" cy="117" r="3"/>
    <circle cx="283" cy="283" r="3"/>
    <circle cx="117" cy="283" r="3"/>
    <circle cx="117" cy="117" r="3"/>
  </g>
</svg>